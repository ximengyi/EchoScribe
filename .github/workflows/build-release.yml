name: Build portable apps

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to"
        required: false
        default: "v1.0"
      upload_release:
        description: "Upload artifacts to the release"
        required: false
        default: "true"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Download ASR model
        run: python scripts/download_model.py

      - name: Run tests
        run: python -m pytest

      - name: Build portable app
        run: python scripts/build_portable.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: EchoScribe-${{ matrix.os }}
          path: dist/EchoScribe-*.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.upload_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: dist/EchoScribe-*.zip
